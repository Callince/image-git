<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consumer Rights</title>
    <style>
        /* Base Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
            touch-action: none;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background: radial-gradient(circle at center, #4b1a7a 0%, #2f1254 50%, #140529 100%);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 1;
        }

        /* Decorative background elements */
        body::before, body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            z-index: -1;
            filter: blur(80px);
            animation: backgroundFloat 15s infinite ease-in-out;
        }

        body::before {
            width: 50vw;
            height: 50vw;
            min-width: 300px;
            min-height: 300px;
            background: rgba(147, 51, 234, 0.4);
            top: -10%;
            left: -10%;
            animation-delay: 0s;
        }

        body::after {
            width: 60vw;
            height: 60vw;
            min-width: 400px;
            min-height: 400px;
            background: rgba(79, 70, 229, 0.3);
            bottom: -15%;
            right: -15%;
            animation-delay: -7.5s;
        }

        @keyframes backgroundFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -50px) scale(1.1); }
        }

        /* Container for the image to make it responsive */
        .img-container {
            width: 100%;
            max-width: 800px;
            height: 100%;
            max-height: calc(100vh - 40px);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: transparent;
            z-index: 2;
            
            /* Entrance Animation */
            opacity: 0;
            animation: slideUpFade 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
        }

        @keyframes slideUpFade {
            0% {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* The actual responsive image */
        .responsive-img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.5);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            
            /* Float Animation */
            animation: floatImage 6s ease-in-out infinite alternate;
        }

        .img-container:hover .responsive-img {
            transform: scale(1.03);
            animation-play-state: paused; 
        }

        @keyframes floatImage {
            0% { transform: translateY(0px); box-shadow: 0 15px 45px rgba(0, 0, 0, 0.5); }
            100% { transform: translateY(-12px); box-shadow: 0 25px 65px rgba(147, 51, 234, 0.5); }
        }

        /* Responsive text below image in case image doesn't load */
        .fallback-text {
            display: none;
            padding: 20px;
            text-align: center;
            color: #fff;
        }

        .responsive-img:not([src])+.fallback-text,
        .responsive-img[src=""]+.fallback-text {
            display: block;
        }

        @media screen and (max-width: 600px) {
            body {
                padding: 15px;
            }

            .img-container {
                max-height: calc(100vh - 30px);
            }
            
            .responsive-img {
                border-radius: 12px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            }
        }
    </style>
</head>

<body>

    <div class="img-container">
        <!-- 
          Replace 'image.png' with the actual filename of your image 
          in the same directory.
        -->
        <img src="WhatsApp Image 2026-03-13 at 12.04.43 PM.jpeg"
            alt="Happy Consumer Rights Day - 6 Basic Consumer Rights" class="responsive-img">
        <div class="fallback-text">
            <h2>Image Not Found</h2>
            <p>Please place your image in the same directory and name it <strong>image.png</strong> (or update the src attribute in this HTML file).</p>
        </div>
    </div>

</body>

</html>
